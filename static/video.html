<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Video Detection | YOLO Vision Lab</title>
    <link rel="stylesheet" href="assets/styles.css">
    <script defer src="assets/app.js"></script>
  </head>
  <body data-page="video">
    <header class="site-header">
      <a class="brand" href="index.html" aria-label="YOLO Vision Lab home">
        <span class="brand-mark"></span>
        <span>YOLO Vision Lab</span>
      </a>
      <nav class="nav-links" aria-label="Primary navigation">
        <a href="index.html">Project</a>
        <a href="image.html">Image Detection</a>
        <a href="video.html" aria-current="page">Video Detection</a>
      </nav>
    </header>

    <main class="tool-page">
      <section class="tool-intro">
        <p class="eyebrow">Video Detection</p>
        <h1>Upload a video for frame-by-frame detection</h1>
      </section>

      <section class="tool-layout">
        <form class="control-panel" id="video-form">
          <label class="file-drop" for="video-file">
            <span class="file-drop-title">Choose video</span>
            <span class="file-drop-meta" id="video-file-name">MP4, MOV, AVI, MKV, or WebM</span>
            <input id="video-file" name="file" type="file" accept="video/*" required>
          </label>

          <div class="field-row">
            <label for="video-conf">Confidence</label>
            <div class="range-wrap">
              <input id="video-conf" type="range" min="0.05" max="0.95" step="0.05" value="0.25">
              <output id="video-conf-output">0.25</output>
            </div>
          </div>

          <div class="field-row">
            <label for="video-size">Image size</label>
            <select id="video-size">
              <option value="640" selected>640 px</option>
              <option value="960">960 px</option>
              <option value="1280">1280 px</option>
            </select>
          </div>

          <div class="field-row">
            <label for="max-frames">Frame limit</label>
            <input id="max-frames" type="number" min="0" max="20000" value="0">
          </div>

          <button class="button primary full" type="submit">Process Video</button>
          <p class="form-message" id="video-message" role="status"></p>
        </form>

        <div class="result-panel">
          <div class="result-media empty" id="video-preview">
            <span>Processed video will appear here</span>
          </div>
          <div class="result-summary three">
            <div>
              <p class="metric-label">Frames</p>
              <p class="metric-value" id="video-frames">0</p>
            </div>
            <div>
              <p class="metric-label">Detections</p>
              <p class="metric-value" id="video-count">0</p>
            </div>
            <div>
              <p class="metric-label">Video Size</p>
              <p class="metric-value" id="video-dimensions">-</p>
            </div>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
